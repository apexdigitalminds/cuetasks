<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="48x48" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#6366f1" />
    <title>CueTasks — Say it. Cue it. Get it done.</title>
    <style>
      /* Prevent flash of unstyled content */
      #root {
        min-height: 100vh;
        background-color: #f3f4f6;
      }
      html.dark #root {
        background-color: #0f172a;
      }

      /* Loading spinner for initial load */
      .loading-spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #6366f1;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
    <script>
      // Apply saved theme before first paint (default dark) to avoid a flash.
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var dark = saved ? saved === 'dark' : true;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();

      // The browser can fire beforeinstallprompt before React mounts, so stash
      // it here; the install UI reads it on mount (see hooks/useInstallPrompt).
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        window.__cuetasksInstallPrompt = e;
      });
    </script>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column;">
        <div class="loading-spinner"></div>
        <p style="margin-top: 16px; color: #6b7280;">Loading CueTasks...</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
