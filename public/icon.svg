<svg width="512" height="512" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cueTile" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="0.55" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Brand gradient tile -->
  <rect width="128" height="128" rx="28" fill="url(#cueTile)"/>

  <!-- Cue swoosh — open speech ring with a tail -->
  <path d="M96.8 37.1 A40 40 0 1 0 96.8 82.9 L108 98"
        stroke="#ffffff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Checkmark cradled inside the swoosh -->
  <path d="M46 62 L60 76 L86 44"
        stroke="#ffffff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Sound-wave arcs radiating right -->
  <path d="M110.3 49.7 A16 16 0 0 1 110.3 70.3" stroke="#ffffff" stroke-width="7.5" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M119.4 42 A28 28 0 0 1 119.4 78" stroke="#ffffff" stroke-width="7.5" stroke-linecap="round" fill="none" opacity="0.55"/>
</svg>
